##### PREFIX #####

# Use Ctrl-a instead of default Ctrl-b
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

##### GENERAL #####

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g history-limit 100000
set -sg escape-time 10
set -g repeat-time 600

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on

##### SPLITS (VertexC-style ergonomics) #####

# Vertical split
bind | split-window -h -c "#{pane_current_path}"

# Horizontal split
bind - split-window -v -c "#{pane_current_path}"

##### PANE NAVIGATION (vim-style) #####

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### WINDOW NAVIGATION #####

bind -r C-h previous-window
bind -r C-l next-window

##### COPY MODE (vi-style) #####

setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send -X rectangle-toggle

##### RELOAD CONFIG #####

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

##### STATUS BAR #####

set -g status-position bottom
set -g status-interval 5

set -g status-left-length 50
set -g status-right-length 150

set -g status-left "#[fg=green]#S #[fg=cyan]| #[fg=yellow]#(whoami)"
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=green]%H:%M "

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bold] #I:#W "

##### VISUAL TWEAKS #####

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour51

set -g message-style bg=black,fg=yellow
set -g status-style bg=colour234,fg=colour136

##### BETTER SPLIT BEHAVIOR #####

setw -g aggressive-resize on
set -g focus-events on
